<div class="main">
    <nav class="tabs" aria-label="Chart selection">
        <a
            *ngFor="let tab of tabs"
            class="tab-link"
            [routerLink]="tab.id"
            routerLinkActive="active"
            [routerLinkActiveOptions]="{ exact: true }"
        >
            {{ tab.label }}
        </a>
    </nav>
    <section class="content">
        <div class="chart-panel">
            <router-outlet></router-outlet>
        </div>
    </section>
</div>
